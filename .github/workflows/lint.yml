name: Lint

on:
  pull_request:
    paths:
      - 'Assets/Scripts/**/*.cs'

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Check formatting
        uses: dotnet format ./Assets/Scripts --verify-no-changes --verbosity diagnostic
